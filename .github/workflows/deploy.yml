name: Deploy to Droplet

on:
  push:
    branches: [main]
    # Docs-only pushes (progress logs) should not trigger a rebuild + pm2 restart.
    paths-ignore:
      - '**.md'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://themexcobh.shop

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: root
          key: ${{ secrets.DO_SSH_KEY }}
          command_timeout: 15m
          script: |
            cd /apps/mex
            git pull origin main
            npm ci
            npm run build
            pm2 restart mex --update-env
